backend:
  name: github
  repo: stefan-mind4/client_test
  branch: main

media_folder: public/images
public_folder: /images

collections:

  - name: "pages"
    label: "Seiten"
    files:

      - name: "home"
        label: "Startseite"
        file: "src/content/home.json"
        fields:
          - { label: "Meta-Titel", name: "meta_title", widget: "string" }
          - { label: "Meta-Beschreibung", name: "meta_description", widget: "text" }
          - { label: "OG-Bild", name: "og_image", widget: "image", required: false }
          - { label: "Kanzlei-Kürzel (z.B. HSOA)", name: "kanzlei_kuerzel", widget: "string" }
          - { label: "Kanzlei-Untertitel", name: "kanzlei_untertitel", widget: "string" }
          - { label: "Nav CTA Text", name: "nav_cta_text", widget: "string" }
          - label: "Navigation Links"
            name: "nav_links"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Ziel", name: "href", widget: "string" }
          - { label: "Hero Eyebrow", name: "hero_eyebrow", widget: "string" }
          - { label: "Hero Headline (HTML erlaubt)", name: "hero_headline", widget: "text" }
          - { label: "Hero Text", name: "hero_text", widget: "text" }
          - { label: "Hero CTA 1", name: "hero_cta_primary", widget: "string" }
          - { label: "Hero CTA 2", name: "hero_cta_secondary", widget: "string" }
          - label: "Hero Stats"
            name: "hero_stats"
            widget: "list"
            field: { label: "Stat", name: "stat", widget: "string" }
          - { label: "Hero Zitat", name: "hero_zitat", widget: "text" }
          - { label: "Kontakt-Kasten Titel", name: "kontakt_card_titel", widget: "string" }
          - { label: "Telefon (Anzeige)", name: "telefon", widget: "string" }
          - { label: "Telefon (Link, z.B. +4315326000)", name: "telefon_link", widget: "string" }
          - { label: "E-Mail", name: "email", widget: "string" }
          - { label: "Adresse (HTML)", name: "adresse_html", widget: "text" }
          - { label: "Sozietät Eyebrow", name: "sozietaet_eyebrow", widget: "string" }
          - { label: "Sozietät Headline", name: "sozietaet_headline", widget: "string" }
          - { label: "Sozietät Text (HTML)", name: "sozietaet_text", widget: "text" }
          - { label: "Sozietät Bild", name: "sozietaet_bild", widget: "image", required: false }
          - { label: "Sozietät Bild Alt-Text", name: "sozietaet_bild_alt", widget: "string", required: false }
          - { label: "Sozietät CTA", name: "sozietaet_cta", widget: "string" }
          - label: "USP Items"
            name: "usp_items"
            widget: "list"
            fields:
              - { label: "Titel", name: "label", widget: "string" }
              - { label: "Beschreibung", name: "desc", widget: "text" }
          - { label: "Kompetenz Eyebrow", name: "kompetenz_eyebrow", widget: "string" }
          - { label: "Kompetenz Headline", name: "kompetenz_headline", widget: "string" }
          - { label: "Kompetenz Subtext", name: "kompetenz_subtext", widget: "text" }
          - label: "Rechtsgebiete"
            name: "rechtsgebiete"
            widget: "list"
            fields:
              - { label: "Icon (Emoji)", name: "icon", widget: "string" }
              - { label: "Titel", name: "title", widget: "string" }
              - { label: "Untertitel", name: "subtitle", widget: "string" }
              - { label: "URL-Slug", name: "slug", widget: "string" }
              - { label: "Beschreibung", name: "desc", widget: "text" }
              - label: "Tags"
                name: "tags"
                widget: "list"
                field: { label: "Tag", name: "tag", widget: "string" }
          - { label: "Partner Eyebrow", name: "partner_eyebrow", widget: "string" }
          - { label: "Partner Headline", name: "partner_headline", widget: "string" }
          - label: "Partner"
            name: "partner"
            widget: "list"
            fields:
              - { label: "Initialen", name: "initials", widget: "string" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Foto", name: "foto", widget: "image", required: false }
              - { label: "Biografie", name: "bio", widget: "text" }
              - label: "Schwerpunkte"
                name: "focus"
                widget: "list"
                field: { label: "Schwerpunkt", name: "item", widget: "string" }
          - { label: "Karriere Eyebrow", name: "karriere_eyebrow", widget: "string" }
          - { label: "Karriere Headline", name: "karriere_headline", widget: "string" }
          - { label: "Karriere Text (HTML)", name: "karriere_text", widget: "text" }
          - { label: "Karriere Bild", name: "karriere_bild", widget: "image", required: false }
          - { label: "Karriere Bild Alt-Text", name: "karriere_bild_alt", widget: "string", required: false }
          - { label: "Karriere CTA", name: "karriere_cta", widget: "string" }
          - label: "Karriere Positionen"
            name: "karriere_positionen"
            widget: "list"
            field: { label: "Position", name: "pos", widget: "string" }
          - label: "Karriere Schritte"
            name: "karriere_schritte"
            widget: "list"
            fields:
              - { label: "Nummer", name: "nr", widget: "string" }
              - { label: "Phase", name: "phase", widget: "string" }
              - { label: "Beschreibung", name: "desc", widget: "text" }
          - { label: "Kontakt Eyebrow", name: "kontakt_eyebrow", widget: "string" }
          - { label: "Kontakt Headline", name: "kontakt_headline", widget: "string" }
          - { label: "Kontakt Text", name: "kontakt_text", widget: "text" }
          - { label: "Kontakt Zitat", name: "kontakt_zitat", widget: "text", required: false }
          - { label: "Kontakt Zitat Autor", name: "kontakt_zitat_autor", widget: "string", required: false }
          - { label: "Footer Adresse (HTML)", name: "footer_adresse_html", widget: "text" }
          - { label: "Footer Firmenname", name: "footer_firma", widget: "string" }

  - name: "leistungen"
    label: "Leistungsseiten"
    folder: "src/content/leistungen"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - { label: "Meta-Titel", name: "meta_title", widget: "string" }
      - { label: "Meta-Beschreibung", name: "meta_description", widget: "text" }
      - { label: "OG-Bild", name: "og_image", widget: "image", required: false }
      - { label: "Breadcrumb Text", name: "hero_breadcrumb", widget: "string" }
      - { label: "Hero Icon (Emoji)", name: "hero_icon", widget: "string" }
      - { label: "Hero Eyebrow", name: "hero_eyebrow", widget: "string" }
      - { label: "Hero Headline (HTML erlaubt)", name: "hero_headline", widget: "text" }
      - { label: "Hero Text", name: "hero_text", widget: "text" }
      - { label: "Hero Bild", name: "hero_bild", widget: "image", required: false }
      - { label: "Hero Bild Alt-Text", name: "hero_bild_alt", widget: "string", required: false }
      - label: "Hero Trust-Items"
        name: "hero_trust_items"
        widget: "list"
        field: { label: "Item", name: "item", widget: "string" }
      - { label: "Telefon (Anzeige)", name: "telefon", widget: "string" }
      - { label: "Telefon (Link)", name: "telefon_link", widget: "string" }
      - { label: "E-Mail", name: "email", widget: "string" }
      - { label: "Adresse (einzeilig)", name: "adresse", widget: "string" }
      - { label: "Leistungen Headline", name: "leistungen_headline", widget: "string" }
      - { label: "Leistungen Subtext", name: "leistungen_subtext", widget: "text" }
      - { label: "Intro Bild", name: "intro_bild", widget: "image", required: false }
      - { label: "Intro Bild Alt-Text", name: "intro_bild_alt", widget: "string", required: false }
      - label: "Leistungen (Accordion)"
        name: "leistungen"
        widget: "list"
        fields:
          - { label: "Nummer (z.B. 01)", name: "nr", widget: "string" }
          - { label: "Titel", name: "title", widget: "string" }
          - { label: "Beschreibung", name: "desc", widget: "text" }
          - { label: "Bild", name: "bild", widget: "image", required: false }
          - { label: "Bild Alt-Text", name: "bild_alt", widget: "string", required: false }
          - label: "Detail-Punkte"
            name: "details"
            widget: "list"
            field: { label: "Punkt", name: "punkt", widget: "string" }
      - { label: "Zielgruppen Headline", name: "zielgruppen_headline", widget: "string" }
      - label: "Zielgruppen"
        name: "zielgruppen"
        widget: "list"
        fields:
          - { label: "Icon (Emoji)", name: "icon", widget: "string" }
          - { label: "Titel", name: "title", widget: "string" }
          - { label: "Herausforderung", name: "pain", widget: "text" }
          - { label: "Unser Beitrag", name: "value", widget: "text" }
          - { label: "Bild", name: "bild", widget: "image", required: false }
          - { label: "Bild Alt-Text", name: "bild_alt", widget: "string", required: false }
          - label: "Tags"
            name: "tags"
            widget: "list"
            field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Prozess Headline", name: "prozess_headline", widget: "string" }
      - { label: "Prozess Subtext", name: "prozess_subtext", widget: "text" }
      - label: "Prozess Schritte"
        name: "prozess_schritte"
        widget: "list"
        fields:
          - { label: "Schritt (z.B. 01)", name: "step", widget: "string" }
          - { label: "Icon (Emoji)", name: "icon", widget: "string" }
          - { label: "Titel", name: "title", widget: "string" }
          - { label: "Beschreibung", name: "desc", widget: "text" }
      - { label: "FAQ Headline", name: "faq_headline", widget: "string" }
      - label: "FAQ"
        name: "faq"
        widget: "list"
        fields:
          - { label: "Frage", name: "q", widget: "string" }
          - { label: "Antwort", name: "a", widget: "text" }
      - { label: "Kontakt Headline", name: "kontakt_headline", widget: "string" }
      - { label: "Kontakt Text", name: "kontakt_text", widget: "text" }
      - { label: "Kontakt Zitat", name: "kontakt_zitat", widget: "text", required: false }
      - { label: "Kontakt Zitat Autor", name: "kontakt_zitat_autor", widget: "string", required: false }
